###########################################################################################
# CONTROL IGHT BASED ON PROGRESS 3D PRINTER
###########################################################################################
- id: "8d356dee-b98d-4a5c-9691-7dd30cabf341"
  alias: "Control - Light - 3D PRinter"
  mode: restart
  trigger:
    - platform: state
      entity_id:
        - sensor.ender_3_progress

  condition:
    - "{{ states('sensor.ender_3_progress') > '95' }}"
    - "{{ is_state('input_select.helpers_scenes', 'scene daytime') }}"

  action:
    - service: light.turn_on
      target:
        entity_id: light.dressoir_2
      data:
        color_name: >-
          {% if states('sensor.ender_3_progress') > '99' %} 
            green
          {% elif states('sensor.ender_3_progress') > '98' %} 
            yellow
          {% elif states('sensor.ender_3_progress') > '97' %} 
            orange
          {% elif states('sensor.ender_3_progress') > '96' %}
            red
          {% endif %}
        brightness_pct: 100