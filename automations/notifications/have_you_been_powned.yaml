- id: "c2075000-ec3f-4a99-a473-cde4028dc905"
  alias: "Notification - HIBPWNED"
  trigger:
    - platform: state
      entity_id: 
        - !secret hibpwned_1
        - !secret hibpwned_2
        - !secret hibpwned_3
        - !secret hibpwned_4
        - !secret hibpwned_5
      variables:
        old_value: "{{ trigger.from_state.state }}"
        new_value: "{{ trigger.to_state.state }}"
        email: "{{ trigger.to_state.attributes.friendly_name[9:] }}"

    # - platform: state
