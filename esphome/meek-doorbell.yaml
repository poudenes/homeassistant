#########################################################
# Below all fixed settings for doorbell PCB
#########################################################
substitutions:
  devicename: meek-doorbell
  friendly: Doorbell
  ip: 192.168.100.211
  neopixel: GPIO02 # (D4)
  # gpio_relay1: GPIO05 # (D1)
  # gpio_relay2: GPIO4 # (D2)
  # gpio_relay3: GPIO15 # (D8)
  gpio_relay4: GPIO13 # (D7)

#########################################################
# Everything below can be copy/paste without problem
#########################################################
esphome:
  name: ${devicename}
  on_boot:
    priority: 600
    then:
      - lambda: WiFi.setPhyMode(WIFI_PHY_MODE_11G);

# WIFI_PHY_MODE_11B: 802.11b mode
# WIFI_PHY_MODE_11G: 802.11g mode
# WIFI_PHY_MODE_11N: 802.11n mode

esp8266:
  board: esp01_1m
  restore_from_flash: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 0s
  fast_connect: true
  manual_ip:
    static_ip: ${ip}
    gateway: 192.168.100.1
    subnet: 255.255.255.0
    dns1: 192.168.100.1
  ap:
    ssid: ${devicename}
    password: !secret password
    channel: 4

api:
  encryption:
    key: !secret api_key
  reboot_timeout: 15min

time:
  - platform: homeassistant
    id: homeassistant_time

captive_portal:

web_server:
  port: 80

preferences:
  flash_write_interval: 1min
  
logger:
  level: INFO
  
ota:
  safe_mode: true
  password: !secret password

button:
  - platform: factory_reset
    name: "${friendly} - Reset"

light:
  - platform: neopixelbus
    default_transition_length: 0s
    type: GRB
    variant: 800KBPS
    pin: ${neopixel}
    num_leds: 1
    name: "${friendly} - Neopixel"
    restore_mode: RESTORE_DEFAULT_OFF
    id: neopixel

binary_sensor:
  - platform: gpio
    pin:
      number: ${gpio_relay4}
      inverted: true
    name: "${friendly} - Doorbell"

switch:
  - platform: safe_mode
    name: "${friendly} - Safe Mode"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${friendly} - ip"
      icon: mdi:lan
    ssid:
      name: "${friendly} - ssid"
      icon: mdi:lan
    bssid:
      name: "${friendly} - bssid"
      icon: mdi:lan
    mac_address:
      name: "${friendly} - mac"
      icon: mdi:lan

  - platform: version
    name: "${friendly} - Version"
    hide_timestamp: true

sensor:
  - platform: wifi_signal
    name: "${friendly} - wifi Signal"
    update_interval: 5min

  - platform: uptime
    name: "${friendly} - Uptime"
    update_interval: 5min