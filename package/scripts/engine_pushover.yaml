###########################################################################################
# PUSHOVER MESSAGE ENGINE
###########################################################################################
pushover_engine:
  alias: "Notify Pushsover Engine"
  description: "Pushover Engine to send messages to my mobile phone"
  mode: parallel
  sequence:
    - service: notify.pushover
      data:
        message: "{{ message }}"
        title: "{{ title }}"
        data:
          priority: "{{ priority }}"
          sound: >-
            {% if priority == 2 %} {{ sound }}
            {% else %} pushover
            {% endif %}
          retry: >-
            {% if priority == 2 %} 60
            {% else %} 0
            {% endif %}
          expire: >-
            {% if priority == 2 %} 3600
            {% else %} 0
            {% endif %}

###########################################################################################
# PRIORITY LEVEL
# lowest = -2, low = -1, normal = 0, high = 1, Emergency = 2
###########################################################################################
