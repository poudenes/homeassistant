#
#   _____ _____ _____ _____ _____ _____ _____    _____ __    __
#  |   __|   __|   | |   __|     | __  |   __|  |  _  |  |  |  |
#  |__   |   __| | | |__   |  |  |    -|__   |  |     |  |__|  |__
#  |_____|_____|_|___|_____|_____|__|__|_____|  |__|__|_____|_____|
#
###########################################################################################
---
###########################################################################################
# SENSOR CERT EXPIRY
# https://www.home-assistant.io/integrations/cert_expiry/
###########################################################################################
- platform: cert_expiry
  host: !secret cert_expire

###########################################################################################
# SENSOR MOON
# https://www.home-assistant.io/integrations/moon/
###########################################################################################
- platform: moon

###########################################################################################
# SENSOR DSMR_READER
# https://www.home-assistant.io/integrations/dsmr_reader/
###########################################################################################
- platform: dsmr_reader

###########################################################################################
# SENSOR FIlESIZE
# https://www.home-assistant.io/integrations/filesize/
###########################################################################################
- platform: filesize
  file_paths:
    - /config/home-assistant.log

###########################################################################################
# SENSOR RFLINK
# https://www.home-assistant.io/integrations/rflink/
###########################################################################################
- platform: rflink
  automatic_add: true

###########################################################################################
# SENSOR SEASON
# https://www.home-assistant.io/integrations/season/
###########################################################################################
- platform: season
  type: astronomical

###########################################################################################
# SENSOR UPTIME
# https://www.home-assistant.io/integrations/uptime/
###########################################################################################
- platform: uptime
  name: "HA Uptime Sensor"

###########################################################################################
# SENSOR WAQI
# https://www.home-assistant.io/integrations/waqi/
###########################################################################################
- platform: waqi
  token: !secret waqi_api
  locations:
    - amsterdam

###########################################################################################
# SENSOR SQL
# https://www.home-assistant.io/integrations/sql/
###########################################################################################
- platform: sql
  db_url: !secret mariadb
  queries:
    - name: Database Size
      query: 'SELECT table_schema "database", Round(Sum(data_length + index_length) / 1048576, 2) "value" FROM information_schema.tables WHERE table_schema="homeassistant" GROUP BY table_schema'
      column: "value"
      unit_of_measurement: MB

###########################################################################################
# SENSOR VERSION
# https://www.home-assistant.io/integrations/version/
###########################################################################################
- platform: version
  source: local

- platform: version
  source: hassio

###########################################################################################
# SENSOR SYSTEM MONITOR
# https://www.home-assistant.io/integrations/systemmonitor/
###########################################################################################
- platform: systemmonitor
  resources:
    - type: disk_use_percent
      arg: /
    - type: memory_use_percent
    - type: memory_free
    - type: swap_use_percent
    - type: ipv4_address
      arg: wlan0
    - type: processor_use
    - type: last_boot
    - type: disk_free
      arg: /

###########################################################################################
# SENSOR TIME_DATE
# https://www.home-assistant.io/integrations/time_date/
###########################################################################################
- platform: time_date
  display_options:
    - "time"
    - "date"
    - "date_time"
    - "date_time_iso"
    - "time_date"
    - "time_utc"
    - "beat"

###########################################################################################
# SENSOR GITHUB
# https://www.home-assistant.io/integrations/filesize/
###########################################################################################
- platform: github
  access_token: !secret github_token
  repositories:
    - path: "letscontrolit/ESPEasy"
      name: "Github ESPEasy"
    - path: "home-assistant/core"
      name: "Github Home Assistant"
    - path: "sidoh/esp8266_milight_hub"
      name: "Github Milight Hub"

###########################################################################################
# FEEDPARSER
# https://github.com/custom-components/feedparser
###########################################################################################
- platform: feedparser
  name: Engineering Feed
  feed_url: "https://alerts.home-assistant.io/feed.xml"
  date_format: "%a, %b %d %I:%M %p"
  inclusions:
    - title
    - updated
    - content
    - link
  exclusions:
    - published

###########################################################################################
# SENSOR AUTHENTICATED
# https://github.com/custom-components/authenticated
###########################################################################################
- platform: authenticated
  log_location: /config/log/

###########################################################################################
# SENSOR HISTORY_STATS
# https://www.home-assistant.io/integrations/history_stats/
###########################################################################################
- platform: history_stats
  name: "Times waching machine has been on last 14 days"
  entity_id: binary_sensor.washing_machine
  state: "on"
  type: count
  duration:
    days: 14
  end: "{{ now() }}"

- platform: history_stats
  name: "Times dryer has been on last 14 days"
  entity_id: binary_sensor.dryer_machine
  state: "on"
  type: count
  duration:
    days: 14
  end: "{{ now() }}"

- platform: history_stats
  name: "Times dishwasher has been on last 14 days"
  entity_id: binary_sensor.dishwasher_machine
  state: "on"
  type: count
  duration:
    days: 14
  end: "{{ now() }}"

###########################################################################################
# SENSOR TEMPLATE
# https://www.home-assistant.io/integrations/template/
###########################################################################################
- platform: template
  sensors:
    harmony:
      friendly_name: "Harmony Status"
      icon_template: mdi:remote-tv
      value_template: >-
        {% if is_state_attr('remote.logitech_harmony', 'current_activity', 'PowerOff') %}
          off
        {% elif is_state_attr('remote.logitech_harmony', 'current_activity', 'AppleTV') %}
          AppleTV
        {% elif is_state_attr('remote.logitech_harmony', 'current_activity', 'Ziggo') %}
          TV
        {% elif is_state_attr('remote.logitech_harmony', 'current_activity', 'AirPlay') %}
          Airplay
        {% elif is_state_attr('remote.logitech_harmony', 'current_activity', 'Kodi') %}
          Kodi
        {% elif is_state_attr('remote.logitech_harmony', 'current_activity', 'Domoticz') %}
          Domoticz
        {% endif %}

    living_room_hvac_mode:
      friendly_name: "Nest HVAC mode"
      value_template: "{{ states('climate.entryway') }}"

    living_room_preset_mode:
      friendly_name: "Nest Preset mode"
      value_template: "{{ state_attr('climate.entryway','preset_mode') }}"

    living_room_eco_temp:
      friendly_name: "Nest Temp. Eco range"
      value_template: >
        {% if 19.5 < state_attr('climate.entryway', 'temperature')|round(1,"half") < 28 %}
          none
        {% else %}
          eco
        {% endif %}

    ###########################################################################################
    # APPLE WATCH TO ADD ON WATCH
    ###########################################################################################
    apple_watch_people_at_home:
      friendly_name: "Apple Watch People At Home"
      value_template: >-
        {% if is_state('input_boolean.kay_home_manual', 'on') and is_state('input_boolean.peter_home_manual', 'on') %}
          CP
        {% elif is_state('input_boolean.peter_home_manual', 'on') %}
          P
        {% elif is_state('input_boolean.kay_home_manual', 'on') %}
          C
        {% else %}
          N
        {% endif %}

    apple_watch_scene:
      friendly_name: "Apple Watch Scene"
      value_template: >-
        {% if is_state('switch.scene_evening', 'on') %}
          E
        {% elif is_state('switch.scene_daytime', 'on') %}
          D
        {% elif is_state('switch.scene_goodnight', 'on') %}
          G
        {% elif is_state('switch.scene_tv', 'on') %}
          T
        {% elif is_state('switch.scene_kodi', 'on')  %}
          K
        {% elif is_state('switch.scene_appletv', 'on') %}
          A
        {% else %}
          O
        {% endif %}

    ###########################################################################################
    # MEEK WIFI UP TIME
    ###########################################################################################
    wifi_up_time_hallway:
      value_template: "{{ ((state_attr('sensor.meek_hallway_wifi_info', 'WiFi')['Connected msec']) / 1000 / 60 / 60 ) | float('offline') | int }}"
      unit_of_measurement: "Hr"

    wifi_up_time_kitchen:
      value_template: "{{ ((state_attr('sensor.meek_kitchen_wifi_info', 'WiFi')['Connected msec']) / 1000 / 60 / 60 ) | float('offline') | int  }}"
      unit_of_measurement: "Hr"

    wifi_up_time_bedroom:
      value_template: "{{ ((state_attr('sensor.meek_bedroom_wifi_info', 'WiFi')['Connected msec']) / 1000 / 60 / 60 ) | float('offline') | int  }}"
      unit_of_measurement: "Hr"

    wifi_up_time_bathroom:
      value_template: "{{ ((state_attr('sensor.meek_bathroom_wifi_info', 'WiFi')['Connected msec']) / 1000 / 60 / 60 ) | float('offline') | int  }}"
      unit_of_measurement: "Hr"

    wifi_up_time_toilet:
      value_template: "{{ ((state_attr('sensor.meek_toilet_wifi_info', 'WiFi')['Connected msec']) / 1000 / 60 / 60 ) | float('offline') | int  }}"
      unit_of_measurement: "Hr"

    wifi_up_time_livingroom:
      value_template: "{{ ((state_attr('sensor.meek_livingroom_wifi_info', 'WiFi')['Connected msec']) / 1000 / 60 / 60 ) | float('offline') | int  }}"
      unit_of_measurement: "Hr"

    wifi_up_time_dressoir:
      value_template: "{{ ((state_attr('sensor.meek_dressoir_wifi_info', 'WiFi')['Connected msec']) / 1000 / 60 / 60 ) | float('offline') | int  }}"
      unit_of_measurement: "Hr"

    wifi_up_time_diningroom:
      value_template: "{{ ((state_attr('sensor.meek_diningroom_wifi_info', 'WiFi')['Connected msec']) / 1000 / 60 / 60 ) | float('offline') | int  }}"
      unit_of_measurement: "Hr"

    ###########################################################################################
    # MEEK WIFI RECONNECTS
    ###########################################################################################
    wifi_reconnect_hallway:
      value_template: "{{ (state_attr('sensor.meek_hallway_wifi_info', 'WiFi')['Number Reconnects']) | float('offline') | int  }}"

    wifi_reconnect_kitchen:
      value_template: "{{ (state_attr('sensor.meek_kitchen_wifi_info', 'WiFi')['Number Reconnects']) | float('offline') | int  }}"

    wifi_reconnect_bedroom:
      value_template: "{{ (state_attr('sensor.meek_bedroom_wifi_info', 'WiFi')['Number Reconnects']) | float('offline') | int  }}"

    wifi_reconnect_bathroom:
      value_template: "{{ (state_attr('sensor.meek_bathroom_wifi_info', 'WiFi')['Number Reconnects']) | float('offline') | int  }}"

    wifi_reconnect_toilet:
      value_template: "{{ (state_attr('sensor.meek_toilet_wifi_info', 'WiFi')['Number Reconnects']) | float('offline') | int  }}"

    wifi_reconnect_livingroom:
      value_template: "{{ (state_attr('sensor.meek_livingroom_wifi_info', 'WiFi')['Number Reconnects']) | float('offline') | int  }}"

    wifi_reconnect_dressoir:
      value_template: "{{ (state_attr('sensor.meek_dressoir_wifi_info', 'WiFi')['Number Reconnects']) | float('offline') | int  }}"

    wifi_reconnect_diningroom:
      value_template: "{{ (state_attr('sensor.meek_diningroom_wifi_info', 'WiFi')['Number Reconnects']) | float('offline') | int  }}"

    ###########################################################################################
    # MEEK WIFI RSSI
    ###########################################################################################
    wifi_rssi_hallway:
      value_template: "{{ (state_attr('sensor.meek_hallway_wifi_info', 'WiFi')['RSSI']) | float('offline') | int  }}"

    wifi_rssi_kitchen:
      value_template: "{{ (state_attr('sensor.meek_kitchen_wifi_info', 'WiFi')['RSSI']) | float('offline') | int  }}"

    wifi_rssi_bedroom:
      value_template: "{{ (state_attr('sensor.meek_bedroom_wifi_info', 'WiFi')['RSSI']) | float('offline') | int  }}"

    wifi_rssi_bathroom:
      value_template: "{{ (state_attr('sensor.meek_bathroom_wifi_info', 'WiFi')['RSSI']) | float('offline') | int  }}"

    wifi_rssi_toilet:
      value_template: "{{ (state_attr('sensor.meek_toilet_wifi_info', 'WiFi')['RSSI']) | float('offline') | int  }}"

    wifi_rssi_livingroom:
      value_template: "{{ (state_attr('sensor.meek_livingroom_wifi_info', 'WiFi')['RSSI']) | float('offline') | int  }}"

    wifi_rssi_dressoir:
      value_template: "{{ (state_attr('sensor.meek_dressoir_wifi_info', 'WiFi')['RSSI']) | float('offline') | int  }}"

    wifi_rssi_diningroom:
      value_template: "{{ (state_attr('sensor.meek_diningroom_wifi_info', 'WiFi')['RSSI']) | float('offline') | int  }}"

    ###########################################################################################
    # MEEK WIFI IP NUMBER
    ###########################################################################################
    wifi_ip_hallway:
      value_template: "{{ (state_attr('sensor.meek_hallway_wifi_info', 'WiFi')['IP Address']) }}"

    wifi_ip_kitchen:
      value_template: "{{ (state_attr('sensor.meek_kitchen_wifi_info', 'WiFi')['IP Address']) }}"

    wifi_ip_bedroom:
      value_template: "{{ (state_attr('sensor.meek_bedroom_wifi_info', 'WiFi')['IP Address']) }}"

    wifi_ip_bathroom:
      value_template: "{{ (state_attr('sensor.meek_bathroom_wifi_info', 'WiFi')['IP Address']) }}"

    wifi_ip_toilet:
      value_template: "{{ (state_attr('sensor.meek_toilet_wifi_info', 'WiFi')['IP Address']) }}"

    wifi_ip_livingroom:
      value_template: "{{ (state_attr('sensor.meek_livingroom_wifi_info', 'WiFi')['IP Address']) }}"

    wifi_ip_dressoir:
      value_template: "{{ (state_attr('sensor.meek_dressoir_wifi_info', 'WiFi')['IP Address']) }}"

    wifi_ip_diningroom:
      value_template: "{{ (state_attr('sensor.meek_diningroom_wifi_info', 'WiFi')['IP Address']) }}"

    adaptive_lighting_color_temperature:
      value_template: "{{ state_attr('switch.adaptive_lighting_sensor', 'color_temp_kelvin') | int(2800) }}"

    adaptive_lighting_color_mired_temperature:
      value_template: "{{ state_attr('switch.adaptive_lighting_sensor', 'color_temp_mired') | int(2800) }}"

    last_alexa:
      value_template: "{{ (states.media_player | selectattr('attributes.last_called','eq',True) | map(attribute='entity_id') | first) }}"

    climate_inside_temperature:
      value_template: "{{ state_attr('climate.entryway','current_temperature') | float }}"

    dayofyear:
      value_template: "{{ now().strftime('%j') }}"

    weekofyear:
      value_template: "{{ now().strftime('%U') }}"

    github_milight_hub_version:
      value_template: "{{ state_attr('sensor.github_milight_hub', 'latest_release_tag') }}"

    github_espeasy_version:
      value_template: "{{ state_attr('sensor.github_espeasy', 'latest_release_tag') }}"

    ###########################################################################################
    # MILIGHT INFORMATION
    ###########################################################################################
    milight_arduino_version:
      value_template: "{{ state_attr('sensor.milight_about', 'arduino_version') }}"

    milight_dropped_packets:
      value_template: "{{ (state_attr('sensor.milight_about', 'queue_stats')['dropped_packets']) | int }}"

    milight_firmware:
      value_template: "{{ state_attr('sensor.milight_about', 'firmware') }}"

    milight_free_heap:
      value_template: "{{ state_attr('sensor.milight_about', 'free_heap') }}"

    milight_ip:
      value_template: "{{ state_attr('sensor.milight_about', 'ip_address') }}"

    milight_length:
      value_template: "{{ (state_attr('sensor.milight_about', 'queue_stats')['length']) | int }}"

    milight_reset_reason:
      value_template: "{{ state_attr('sensor.milight_about', 'reset_reason') }}"

    milight_variant:
      value_template: "{{ state_attr('sensor.milight_about', 'variant') }}"

    milight_version:
      value_template: "{{ state_attr('sensor.milight_about', 'version') }}"

    ###########################################################################################
    # MVPS INFORMATION SSH / WWW / VMAIL
    ###########################################################################################
    ssh_login_date:
      value_template: "{{ (state_attr('sensor.mvps_ssh_information', 'ssh')['date']) }}"

    ssh_login_ip:
      value_template: "{{ (state_attr('sensor.mvps_ssh_information', 'ssh')['ip']) }}"

    ssh_login_time:
      value_template: "{{ (state_attr('sensor.mvps_ssh_information', 'ssh')['time']) }}"

    ssh_login_user:
      value_template: "{{ (state_attr('sensor.mvps_ssh_information', 'ssh')['user']) }}"

    www_oudenes_size:
      value_template: "{{ (state_attr('sensor.www_backup_information', 'www')['oudenes']) }}"
      unit_of_measurement: "MB"

    www_hairdelicious_size:
      value_template: "{{ (state_attr('sensor.www_backup_information', 'www')['hairdelicious']) }}"
      unit_of_measurement: "MB"

    www_backup_time:
      value_template: "{{ (state_attr('sensor.www_backup_information', 'www')['time']) }}"

    www_backup_date:
      value_template: "{{ (state_attr('sensor.www_backup_information', 'www')['date']) }}"

    www_asia_size:
      value_template: "{{ (state_attr('sensor.www_backup_information', 'www')['asia']) }}"
      unit_of_measurement: "MB"

    vmail_backup_time:
      value_template: "{{ (state_attr('sensor.vmail_backup_information', 'vmailbackup')['time']) }}"

    vmail_backup_size:
      value_template: "{{ (state_attr('sensor.vmail_backup_information', 'vmailbackup')['size']) }}"
      unit_of_measurement: "MB"

    vmail_backup_date:
      value_template: "{{ (state_attr('sensor.vmail_backup_information', 'vmailbackup')['date']) }}"

    ###########################################################################################
    # NEST PROTECT
    ###########################################################################################
    nest_protect_bedroom_status_homekit:
      friendly_name: "Nest Protect Bedroom Homekit"
      value_template: "{{ 'off' if is_state('sensor.bedroom_nest_protect_color_status', 'green') else 'on' }}"

    nest_protect_livingroom_status_homekit:
      friendly_name: "Nest Protect Livingroom Homekit"
      value_template: "{{ 'off' if is_state('sensor.living_room_nest_protect_color_status', 'green') else 'on' }}"

    nest_protect_diningroom_status_homekit:
      friendly_name: "Nest Protect diningroom Homekit"
      value_template: "{{ 'off' if is_state('sensor.dining_room_nest_protect_color_status', 'green') else 'on' }}"

    nextsunrise:
      friendly_name: "Next Sun Rise"
      value_template: "{{ (as_timestamp(state_attr('sun.sun','next_rising')) | timestamp_custom('%-H:%M')) }}"
      icon_template: mdi:weather-sunset-up

    nextsunset:
      friendly_name: "Next Sun Set"
      value_template: "{{ (as_timestamp(state_attr('sun.sun','next_setting')) | timestamp_custom('%-H:%M')) }}"
      icon_template: mdi:weather-sunset-down

    period_of_day:
      friendly_name: "Period of the Day"
      value_template: >-
        {% if (as_timestamp(state_attr('sun.sun','next_dusk'))) - (as_timestamp(state_attr('sun.sun','next_setting'))) < 0 %}
          Dusk
        {% elif (as_timestamp(state_attr('sun.sun','next_rising'))) - (as_timestamp(state_attr('sun.sun','next_dawn'))) < 0 %}
          Dawn
        {% elif (state_attr('sun.sun','elevation')) < 0 %}
          NightTime
        {% else %}
          DayTime
        {% endif %}
      icon_template: "{{ 'mdi:weather-sunny' if is_state('sun.sun', 'above_horizon') else 'mdi:weather-night' }}"

    scene_active:
      friendly_name: "Scene "
      icon_template: mdi:arrow-decision-auto
      value_template: >-
        {% set str = "" %}
        {% if is_state('switch.scene_daytime','on') %} {% set str = str + ":Daytime" %} {% endif %}
        {% if is_state('switch.scene_dinner','on') %} {% set str = str + ":Dinner" %} {% endif %}
        {% if is_state('switch.scene_evening','on') %} {% set str = str + ":Evening" %} {% endif %}
        {% if is_state('switch.scene_goodnight','on') %} {% set str = str + ":Goodnight" %} {% endif %}
        {% if is_state('switch.scene_appletv','on') %} {% set str = str + ":AppleTV" %} {% endif %}
        {% if is_state('switch.scene_tv','on') %} {% set str = str + ":TV" %} {% endif %}
        {% if is_state('switch.scene_kodi','on') %} {% set str = str + ":Kodi" %} {% endif %}
        {% if is_state('switch.scene_sleeping','on') %} {% set str = str + ":Sleeping" %} {% endif %}
        {% if is_state('switch.scene_romantic','on') %} {% set str = str + ":Sexy" %} {% endif %}
        {% if is_state('switch.scene_disco','on') %} {% set str = str + ":Disco" %} {% endif %}
        {% if is_state('switch.scene_cooking','on') %} {% set str = str + ":Cooking" %} {% endif %}
        {% if is_state('switch.scene_guests','on') %} {% set str = str + ":Guests" %} {% endif %}
        {% if is_state('switch.kay_learning','on') %} {% set str = str + ":Kay Learning" %} {% endif %}
        {% set arr = str[1:].split(":") %}
        {%- if str | length == 0 %}
            No Scenes active.
        {%- elif arr | count == 1 %}
            {{arr[0]}} is on.
        {% else %}
            {% for switch in arr -%}
                {%- if loop.first %}{% elif loop.last %}, {% else %}, {% endif -%}
                {{switch}}
            {%- endfor %} are on.
        {% endif -%}

    switch_active:
      friendly_name: "Switch "
      icon_template: mdi:ceiling-light
      value_template: >-
        {% set str = "" %}
        {% if is_state('switch.wall','on') %} {% set str = str + ":Wall" %} {% endif %}
        {% if is_state('switch.window','on') %} {% set str = str + ":Window" %} {% endif %}
        {% if is_state('switch.meek_livingroom','on') %} {% set str = str + ":Livingroom" %} {% endif %}
        {% if is_state('switch.kitchen','on')%} {% set str = str + ":Kitchen" %} {% endif %}
        {% if is_state('switch.sink','on') %} {% set str = str + ":Sink" %} {% endif %}
        {% if is_state('switch.diningroom','on') %} {% set str = str + ":Diningroom" %} {% endif %}
        {% if is_state('switch.dressoir','on') %} {% set str = str + ":Dressoir" %} {% endif %}
        {% if is_state('switch.hallway','on') %} {% set str = str + ":Hallway" %} {% endif %}
        {% if is_state('switch.balcony','on') %} {% set str = str + ":Balcony" %} {% endif %}
        {% if is_state('switch.bedroom','on') %} {% set str = str + ":Bedroom" %} {% endif %}
        {% if is_state('switch.bathroom','on') %} {% set str = str + ":Bathroom" %} {% endif %}
        {% if is_state('switch.toilet','on') %} {% set str = str + ":Toilet" %} {% endif %}
        {% if is_state('switch.cooking','on') %} {% set str = str + ":Cooking" %} {% endif %}
        {% if is_state('switch.newkaku_014e5906_a','on') %} {% set str = str + ":Testing" %} {% endif %}
        {% set arr = str[1:].split(":") %}
        {%- if str | length == 0 %}
            All switches off.
        {%- elif arr | count == 1 %}
            {{arr[0]}} is on.
        {% else %}
            {% for switch in arr -%}
                {%- if loop.first %}{% elif loop.last %}, {% else %}, {% endif -%}
                {{switch}}
            {%- endfor %} are on.
        {% endif -%}

    other_active:
      friendly_name: "Other "
      icon_template: mdi:nintendo-switch
      value_template: >-
        {% set str = "" %}
        {% if is_state('switch.dnc','on') %} {% set str = str + ":DNC" %} {% endif %}
        {% if is_state('switch.lux_low','on') %} {% set str = str + ":Lux Low" %} {% endif %}
        {% if is_state('switch.vacation','on') %} {% set str = str + ":Emu. Holiday" %} {% endif %}
        {% if is_state('group.adaptive_lighting','on') %} {% set str = str + ":Cir. Light" %} {% endif %}
        {% if is_state('group.zwave_switches','on') %} {% set str = str + ":ZWave Switches" %} {% endif %}
        {% if is_state('switch.toilet_fan','on') %} {% set str = str + ":Toilet Fan" %} {% endif %}
        {% set arr = str[1:].split(":") %}
        {%- if str | length == 0 %}
            Everything is off.
        {%- elif arr | count == 1 %}
            {{arr[0]}} is on.
        {% else %}
            {% for switch in arr -%}
                {%- if loop.first %}{% elif loop.last %}, {% else %}, {% endif -%}
                {{switch}}
            {%- endfor %} are on.
        {% endif -%}

    waqi_time:
      value_template: "{{ state_attr('sensor.waqi_vondelpark_amsterdam', 'time') }}"
      friendly_name: "Time last update"
      icon_template: mdi:update

