###########################################################################################
# SENSOR COMMAND_LINE
# https://www.home-assistant.io/integrations/sensor.command_line/
###########################################################################################
- platform: command_line
  name: "Birthday"
  command: "cat /config/package/json/calendar.json"
  scan_interval: 21600
  value_template: >-
    {% set today = now().month  ~ '/' ~ now().day  %}
    {% set birthday =  value_json.json_calendars.birthday[ today ] %}
      {% if birthday | trim == "" %}
        {% set birthday =  "Nothing" %}
        {% endif %}
    {{ birthday }}

- platform: command_line
  name: "Holiday"
  command: "cat /config/package/json/calendar.json"
  scan_interval: 21600
  value_template: >-
    {% set today = now().month  ~ '/' ~ now().day  %}
    {% set holiday =  value_json.json_calendars.holiday[ today ] %}
      {% if holiday | trim == "" %}
        {% set holiday =  "Nothing" %}
        {% endif %}
    {{ holiday }}

- platform: command_line
  name: "Events"
  command: "cat /config/package/json/calendar.json"
  scan_interval: 21600
  value_template: >-
    {% set today = now().month  ~ '/' ~ now().day  %}
    {% set events =  value_json.json_calendars.events[ today ] %}
      {% if events | trim == "" %}
        {% set events =  "Nothing" %}
        {% endif %}
    {{ events }}

- platform: command_line
  name: "HA CPU Temperature"
  command: "cat /sys/class/thermal/thermal_zone0/temp"
  unit_of_measurement: "°C"
  value_template: "{{ value | multiply(0.001) | round(1) }}"

- platform: command_line
  name: "HA GPU Temperature"
  command: "/opt/vc/bin/vcgencmd measure_temp"
  unit_of_measurement: "°C"
  value_template: '{{ value | replace("temp=", "") | replace("''C", "") }}'

