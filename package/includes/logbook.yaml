    - automation.patches_milight_livingroom_group_0
    - automation.patches_milight_kitchen_group_0
    - automation.patches_milight_sink_group_0
    - automation.patches_milight_dressoir_group_0
    - automation.patches_milight_toilet_group_0
    - automation.system_automatic_theme_change_day_night

