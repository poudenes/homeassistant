##########################################################################################
# https://www.home-assistant.io/integrations/template/
##########################################################################################
---
##########################################################################################
# BINARY SENSORS
##########################################################################################

##########################################################################################
# CHECK WHAT DEVICES ARE OFFLINE ON ASUS
##########################################################################################
- binary_sensor:
    - name: "Asus devices offline"
      state: "{{ integration_entities('asusrouter') | select('is_state', 'not_home') | list | count > 0 | float(false) }}"
      unique_id: "42a19e1a-9396-42a9-81a1-94e8ee74fa5d"
      attributes:
        entity_id: "{{ integration_entities('asusrouter') | select('is_state', 'not_home') | list }}"
        
##########################################################################################
# FOR CRITICAL TEMPERATURE RISING 3D PRINTER
##########################################################################################
- binary_sensor:
    - name: "3D Printer bed temp rising"
      unique_id: "4548ba6b-a249-485c-9913-664728ec0982"
      state: >-
        {% set value = (states('sensor.ender_3_bed_temperature') | int(default=0) | round(1) - states('sensor.ender_3_bed_target') | int(default=0) | round(1) ) > 5 %}
        {{ value }}

- binary_sensor:
    - name: "3D Printer extruder temp rising"
      unique_id: "1072442e-a309-40ae-a960-81c8c29a86b8"
      state: >-
        {% set value = (states('sensor.ender_3_extruder_temperature') | int(default=0) | round(1) - states('sensor.ender_3_extruder_target') | int(default=0) | round(1) ) > 5 %}
        {{ value }}

##########################################################################################
# FOR AUTOMATION OF BATHROOM FAN
##########################################################################################
- binary_sensor:
    - name: "Fan hum lower then avg"
      unique_id: "438dadb7-2688-4329-86c7-02c57f8864dc"
      state: >-
        {% set value = (states('sensor.bathroom_humidity') | int(default=0) | round(1) - states('sensor.master_bathroom_humidity_average_linear_24h') | int(default=0) | round(1) ) > states('input_select.helpers_master_bath_humidity_threshold') | int(default=0) %}
        {{ value }}
      attributes:
        hum: "{{ states('sensor.bathroom_humidity') | int(default=0) }}"
        avg: "{{ states('sensor.master_bathroom_humidity_average_linear_24h') | int(default=0) }}"
        input: "{{ states('input_select.helpers_master_bath_humidity_threshold') | int(default=0) }}"
        hum_avg: >-
          {% set calculation2 = states('sensor.bathroom_humidity')|int(default=0) - states('sensor.master_bathroom_humidity_average_linear_24h')|int(default=0) %}
          {{ calculation2 }}

- binary_sensor:
    - name: "Hum fan calculate difference"
      unique_id: "0fcf93c7-dc39-485c-b1e4-6114dc8f4e21"
      state: >-
        {% set value = (states('sensor.master_bathroom_humidity_average_linear_24h') | int(default=0) | round(1) - states('sensor.bathroom_humidity') | int(default=0) | round(1) ) > states('input_select.helpers_master_bath_humidity_threshold') | int(default=0) %}
        {{ value }}
      attributes:
        hum: "{{ states('sensor.bathroom_humidity') | int(default=0) }}"
        avg: "{{ states('sensor.master_bathroom_humidity_average_linear_24h') | int(default=0) }}"
        input: "{{ states('input_select.helpers_master_bath_humidity_threshold') | int(default=0) }}"
        hum_avg: >-
          {% set calculation2 = states('sensor.bathroom_humidity')|int(default=0) - states('sensor.master_bathroom_humidity_average_linear_24h')|int(default=0) %}
          {{ calculation2 }}
          
- binary_sensor:
    - name: "Group Family Manual"
      unique_id: "3e43a954-abc1-447a-af7c-8f789ba73f2f"
      state: "{{ is_state('input_boolean.helpers_kay_home_homekit', 'on') or is_state('input_boolean.helpers_peter_home_homekit', 'on') }}"
      device_class: presence
      delay_off: "00:15:00"

##########################################################################################
# WASHING, DRYER and DISKWASHER Machines
##########################################################################################
- binary_sensor:
    - name: "Washing machine"
      unique_id: "e9f8cb05-65b3-4e42-b8d8-249e47c80dc1"
      state: "{{ states('sensor.washer_watt') | float(0) > 7 }}"
      attributes:
        kwh: >-
          {% set value = states('sensor.washer_kwh') | float(0) %}
          {% set const = 21474836.47 %}
          {% if value < 0 %}
            {{ (value + const) | round(2) }}
          {% else %}
            {{ value }}
          {% endif %}
      icon: >-
        {% if is_state("binary_sensor.washing_machine", "on") %}
          mdi:washing-machine
        {% else %}
          mdi:washing-machine-off
        {% endif %}
      availability: >
        {% set ref = states('sensor.washer_watt') | float('unavailable')  %}
        {{ ref is number }} 
      delay_off: "00:10:00"

- binary_sensor:
    - name: "Dryer machine"
      unique_id: "185cd1a5-eca9-45fa-8162-05dc1f13a082"
      state: "{{ states('sensor.dryer_watt') | float(0) > 7 }}"
      attributes:
        kwh: >-
          {% set value = states('sensor.dryer_kwh') | float(0) %}
          {% set const = 21474836.47 %}
          {% if value < 0 %}
            {{ (value + const) | round(2) }}
          {% else %}
            {{ value }}
          {% endif %}
      icon: >-
        {% if is_state('binary_sensor.dryer_machine', 'on') %}
          mdi:tumble-dryer
        {% else %}
          mdi:tumble-dryer-off
        {% endif %}
      availability: >
        {% set ref = states('sensor.dryer_watt') | float('unavailable')  %}
        {{ ref is number }} 
      delay_off: "00:10:00"

- binary_sensor:
    - name: "Dishwasher machine"
      unique_id: "5b332d22-df74-4e91-a156-79ab8d5762af"
      state: "{{ states('sensor.dishwasher_watt') | float(0) > 7 }}" # was 5
      attributes:
        kwh: >-
          {% set value = states('sensor.dishwasher_kwh') | float(0) %}
          {% set const = 21474836.47 %}
          {% if value < 0 %}
            {{ (value + const) | round(2) }}
          {% else %}
            {{ value }}
          {% endif %}
      icon: >-
        {% if is_state("binary_sensor.dishwasher_machine", "on") %}
          mdi:dishwasher
        {% else %}
          mdi:dishwasher-off
        {% endif %}
      availability: >
        {% set ref = states('sensor.dishwasher_watt') | float('unavailable')  %}
        {{ ref is number }}
      delay_off: "00:10:00"